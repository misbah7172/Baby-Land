services:
  - type: redis
    name: baby-land-redis
    plan: starter

  - type: web
    name: baby-land-frontend
    env: docker
    rootDir: .
    dockerfilePath: frontend/Dockerfile
    plan: starter
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOSTNAME
        value: 0.0.0.0
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false
      - key: BACKEND_API_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: baby-land-redis
          property: connectionString
      - key: COOKIE_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_ADMIN_EMAIL
        sync: false
      - key: NEXT_PUBLIC_ADMIN_PASSWORD_HASH
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: COOKIE_SECURE
        sync: false

  - type: web
    name: baby-land-backend
    env: docker
    rootDir: .
    dockerfilePath: backend/Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PRISMA_PROVIDER
        value: postgres
      - key: REDIS_URL
        fromService:
          type: redis
          name: baby-land-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: COOKIE_SECURE
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
